<!DOCTYPE html>
<html>
<head>
    <title>Map Isolation Test</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        /* Map ke box ko size dene ke liye */
        #map { height: 600px; width: 100%; }
    </style>
</head>
<body>

    <h1>Map Test Page</h1>
    <p>Agar neeche map dikh raha hai, toh problem aapke dashboard.html file mein hai.</p>

    <div id="map"></div>

    <script>
        // Sabse simple map banane ka code
        var map = L.map('map').setView([51.505, -0.09], 13); // London pe focus

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        L.marker([51.5, -0.09]).addTo(map).bindPopup("It works!");
    </script>

</body>
</html>
